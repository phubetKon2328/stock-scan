<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สแกนบาร์โค้ด</title>
    <script src="https://cdn.jsdelivr.net/npm/liff@2.22.3/build/liff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #header {
        background: #111;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      #header span {
        font-size: 15px;
        font-weight: 500;
      }
      #cancel {
        color: #06c755;
        font-size: 14px;
        cursor: pointer;
      }
      #status {
        padding: 8px 16px;
        text-align: center;
        font-size: 13px;
        color: #06c755;
        background: #111;
        flex-shrink: 0;
      }
      #camera-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      canvas {
        display: none;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      #frame {
        width: 240px;
        height: 150px;
        position: relative;
      }
      #frame::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 2px solid rgba(6, 199, 85, 0.3);
      }
      .corner {
        position: absolute;
        width: 24px;
        height: 24px;
      }
      .corner.tl {
        top: 0;
        left: 0;
        border-top: 3px solid #06c755;
        border-left: 3px solid #06c755;
      }
      .corner.tr {
        top: 0;
        right: 0;
        border-top: 3px solid #06c755;
        border-right: 3px solid #06c755;
      }
      .corner.bl {
        bottom: 0;
        left: 0;
        border-bottom: 3px solid #06c755;
        border-left: 3px solid #06c755;
      }
      .corner.br {
        bottom: 0;
        right: 0;
        border-bottom: 3px solid #06c755;
        border-right: 3px solid #06c755;
      }
      #scan-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: #06c755;
        opacity: 0.8;
        animation: scanMove 2s linear infinite;
      }
      @keyframes scanMove {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }
      #manual-wrap {
        padding: 12px 16px;
        background: #111;
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      #manual-input {
        flex: 1;
        background: #222;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 8px 12px;
        color: #fff;
        font-size: 14px;
      }
      #manual-btn {
        background: #06c755;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      #footer {
        background: #111;
        padding: 10px;
        text-align: center;
        font-size: 12px;
        color: #666;
        flex-shrink: 0;
      }
      #method-badge {
        font-size: 11px;
        color: #444;
        text-align: center;
        padding: 4px;
        background: #111;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <span>📦 สแกนบาร์โค้ด</span>
      <span id="cancel" onclick="cancelScan()">ยกเลิก</span>
    </div>

    <div id="status">กำลังเปิดกล้อง...</div>
    <div id="method-badge"></div>

    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <div id="frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div id="scan-line"></div>
        </div>
      </div>
    </div>

    <div id="manual-wrap">
      <input
        id="manual-input"
        type="text"
        inputmode="numeric"
        placeholder="พิมพ์บาร์โค้ดเอง"
      />
      <button id="manual-btn" onclick="manualInput()">ส่ง</button>
    </div>

    <div id="footer">จ่อบาร์โค้ดให้อยู่ในกรอบสีเขียว</div>

    <script>
      const LIFF_ID = "2009823905-mkKfG4F4";
      const ACTION =
        new URLSearchParams(location.search).get("action") || "ออก";
      let scanning = true;
      let liffReady = false;

      async function init() {
        try {
          await liff.init({ liffId: LIFF_ID });
          liffReady = true;
        } catch (e) {
          console.log("LIFF not available");
        }
        startCamera();
      }

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          });
          const video = document.getElementById("video");
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            document.getElementById("status").textContent = "พร้อมสแกนแล้ว ✅";
            startDecoder();
          };
        } catch (err) {
          document.getElementById("status").textContent =
            "❌ เปิดกล้องไม่ได้: " + err.message;
        }
      }

      function startDecoder() {
        if ("BarcodeDetector" in window) {
          document.getElementById("method-badge").textContent =
            "engine: BarcodeDetector";
          useBarcodeDetector();
        } else {
          document.getElementById("method-badge").textContent = "engine: ZXing";
          useZXing();
        }
      }

      function useBarcodeDetector() {
        const video = document.getElementById("video");
        const detector = new BarcodeDetector({
          formats: ["ean_13", "ean_8", "code_128", "upc_a", "upc_e"],
        });
        const timer = setInterval(async () => {
          if (!scanning) {
            clearInterval(timer);
            return;
          }
          if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
          try {
            const results = await detector.detect(video);
            if (results.length > 0) {
              scanning = false;
              clearInterval(timer);
              gotBarcode(results[0].rawValue);
            }
          } catch (e) {}
        }, 200);
      }

      function useZXing() {
        const video = document.getElementById("video");
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.UPC_A,
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        const reader = new ZXing.BrowserMultiFormatReader(hints, 300);
        reader.decodeFromVideoElement(video, (result, err) => {
          if (result && scanning) {
            scanning = false;
            gotBarcode(result.getText());
          }
        });
      }

      function gotBarcode(barcode) {
        document.getElementById("status").textContent =
          "✅ สแกนได้: " + barcode;
        document.getElementById("scan-line").style.animation = "none";
        setTimeout(() => sendBarcode(barcode), 500);
      }

      function manualInput() {
        const val = document.getElementById("manual-input").value.trim();
        if (!val) return;
        gotBarcode(val);
      }

      function sendBarcode(barcode) {
        if (liffReady) {
          liff
            .sendMessages([{ type: "text", text: ACTION + " " + barcode }])
            .then(() => liff.closeWindow())
            .catch(() => showResult(barcode));
        } else {
          showResult(barcode);
        }
      }

      function showResult(barcode) {
        document.getElementById("status").textContent =
          "✅ บาร์โค้ด: " + barcode;
      }

      function cancelScan() {
        scanning = false;
        if (liffReady) {
          liff.closeWindow();
        } else {
          window.close();
        }
      }

      init();
    </script>
  </body>
</html>
