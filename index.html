<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สแกนบาร์โค้ด</title>
    <script src="https://cdn.jsdelivr.net/npm/liff@2.22.3/build/liff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #header {
        background: #111;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #header span {
        font-size: 15px;
        font-weight: 500;
      }
      #cancel {
        color: #06c755;
        font-size: 14px;
        cursor: pointer;
      }
      #camera-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #frame {
        width: 220px;
        height: 140px;
        position: relative;
      }
      #frame::before,
      #frame::after,
      #frame > span::before,
      #frame > span::after {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
      }
      #frame::before {
        top: 0;
        left: 0;
        border-top: 3px solid #06c755;
        border-left: 3px solid #06c755;
        border-radius: 3px 0 0 0;
      }
      #frame::after {
        top: 0;
        right: 0;
        border-top: 3px solid #06c755;
        border-right: 3px solid #06c755;
        border-radius: 0 3px 0 0;
      }
      #frame > span::before {
        bottom: 0;
        left: 0;
        border-bottom: 3px solid #06c755;
        border-left: 3px solid #06c755;
        border-radius: 0 0 0 3px;
      }
      #frame > span::after {
        bottom: 0;
        right: 0;
        border-bottom: 3px solid #06c755;
        border-right: 3px solid #06c755;
        border-radius: 0 0 3px 0;
      }
      #scan-line {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: #06c755;
        animation: scan 2s linear infinite;
        opacity: 0.8;
      }
      @keyframes scan {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }
      #footer {
        background: #111;
        padding: 12px;
        text-align: center;
        font-size: 13px;
        color: #aaa;
      }
      #status {
        padding: 8px 16px;
        text-align: center;
        font-size: 13px;
        color: #06c755;
        background: #111;
      }
      #manual-wrap {
        padding: 12px 16px;
        background: #111;
        display: flex;
        gap: 8px;
      }
      #manual-input {
        flex: 1;
        background: #222;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 8px 12px;
        color: #fff;
        font-size: 14px;
      }
      #manual-btn {
        background: #06c755;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <span>📦 สแกนบาร์โค้ด</span>
      <span id="cancel" onclick="cancelScan()">ยกเลิก</span>
    </div>

    <div id="status">กำลังเปิดกล้อง...</div>

    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="overlay">
        <div id="frame">
          <span></span>
          <div id="scan-line"></div>
        </div>
      </div>
    </div>

    <div id="manual-wrap">
      <input
        id="manual-input"
        type="text"
        inputmode="numeric"
        placeholder="หรือพิมพ์บาร์โค้ดเอง"
      />
      <button id="manual-btn" onclick="manualInput()">ส่ง</button>
    </div>

    <div id="footer">จ่อบาร์โค้ดในกรอบสีเขียว</div>

    <script>
      const LIFF_ID = "2009823905-mkKfG4F4";
      const ACTION =
        new URLSearchParams(location.search).get("action") || "ออก";

      let scanning = true;

      async function init() {
        try {
          await liff.init({ liffId: LIFF_ID });
          document.getElementById("status").textContent = "กำลังเปิดกล้อง...";
          startCamera();
        } catch (err) {
          document.getElementById("status").textContent =
            "❌ เกิดข้อผิดพลาด: " + err.message;
        }
      }

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          document.getElementById("video").srcObject = stream;
          document.getElementById("status").textContent = "พร้อมสแกนแล้ว ✅";
          startDecoder();
        } catch (err) {
          document.getElementById("status").textContent =
            "❌ ไม่สามารถเปิดกล้องได้";
        }
      }

      function startDecoder() {
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.CODE_128,
        ]);
        const reader = new ZXing.BrowserMultiFormatReader(hints);
        const video = document.getElementById("video");

        reader.decodeFromVideoElement(video, (result, err) => {
          if (result && scanning) {
            scanning = false;
            const barcode = result.getText();
            document.getElementById("status").textContent =
              "✅ สแกนได้: " + barcode;
            sendBarcode(barcode);
          }
        });
      }

      function manualInput() {
        const val = document.getElementById("manual-input").value.trim();
        if (!val) return;
        sendBarcode(val);
      }

      function sendBarcode(barcode) {
        liff
          .sendMessages([
            {
              type: "text",
              text: ACTION + " " + barcode,
            },
          ])
          .then(() => {
            liff.closeWindow();
          })
          .catch((err) => {
            document.getElementById("status").textContent =
              "❌ ส่งไม่ได้: " + err.message;
          });
      }

      function cancelScan() {
        liff.closeWindow();
      }

      init();
    </script>
  </body>
</html>
